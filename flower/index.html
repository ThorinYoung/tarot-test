<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#fbf6ea">
<title>合成花 · 内部演示</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='8' fill='%23f3cf66'/%3E%3Ccircle cx='24' cy='22' r='12' fill='%23dc8190'/%3E%3Ccircle cx='40' cy='22' r='12' fill='%23f6bcc1'/%3E%3Ccircle cx='22' cy='40' r='12' fill='%23b8a1dc'/%3E%3Ccircle cx='42' cy='40' r='12' fill='%238fb0e4'/%3E%3C/svg%3E">
<link rel="stylesheet" href="flower.css?v=007">
</head>
<body>
<main class="garden" id="garden">
  <header class="hud">
    <div class="hud-row">
      <a class="icon-btn" href="../merge/index.html" title="缀星合成">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round"/>
        </svg>
      </a>

      <div class="score-block">
        <div class="best-line"><span>BEST</span><b id="bestScore">0</b></div>
        <div class="score-box" id="scoreBox">0</div>
      </div>

      <div class="tools">
        <button class="tool-btn" id="btnSpray" title="喷壶">
          <span class="tool-count" id="sprayCount">1</span>
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M9 14h9c3.5 0 6 2.5 6 6v5H7v-9c0-1.1.9-2 2-2Z"/>
            <path d="M19 14v-3c0-2.2 1.8-4 4-4h2"/>
            <path d="M24 7h5M26 5v4M11 14V9h5v5"/>
            <path d="M10 19h11" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="tool-btn" id="btnSpade" title="花铲">
          <span class="tool-count" id="spadeCount">1</span>
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M21 4l7 7-4 4-7-7 4-4Z"/>
            <path d="M18 10 7 21"/>
            <path d="M5 23c3.5 4.5 9 4.5 12 0-2.6-2.2-7-2.3-12 0Z"/>
          </svg>
        </button>
        <button class="tool-btn plain" id="btnRestart" title="重新开始">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.9">
            <path d="M24 10a10 10 0 1 0 2 10" stroke-linecap="round"/>
            <path d="M24 4v6h-6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="next-row">
      <span class="brand">合成花</span>
      <canvas id="nextCanvas" width="74" height="74" aria-label="下一朵花"></canvas>
      <span class="tier-name" id="tierName">三色堇</span>
    </div>

    <section class="bouquet-panel" aria-label="今日花束">
      <div class="bouquet-head">
        <button class="level-info" id="btnLevelBook" title="关卡花册">
          <span><em id="levelTag">第 1 关</em><strong id="levelName">初恋花园</strong></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m8 10 4 4 4-4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <b><span id="bouquetCount">0</span>/<span id="bouquetGoal">3</span></b>
      </div>
      <div class="bouquet-orders" id="bouquetOrders"></div>
    </section>
  </header>

  <section class="field-wrap" id="fieldWrap">
    <div class="garland" aria-hidden="true">
      <i class="rose small"></i><i class="leaf"></i><i class="rose"></i><i class="leaf flip"></i>
      <i class="rose tiny"></i><i class="leaf"></i><i class="rose"></i><i class="leaf flip"></i>
      <i class="rose small"></i><i class="leaf"></i><i class="rose"></i><i class="leaf flip"></i>
      <i class="rose tiny"></i><i class="leaf"></i><i class="rose"></i><i class="leaf flip"></i>
    </div>
    <canvas id="game"></canvas>
  </section>

  <div class="toast" id="toast"></div>
  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="modal">
      <div class="modal-title" id="modalTitle">花园已满</div>
      <div class="modal-score"><span id="finalScore">0</span></div>
      <div class="modal-stats" id="modalStats"></div>
      <div class="modal-actions">
        <button class="modal-btn" id="btnNextLevel" hidden>下一关</button>
        <button class="modal-btn minor" id="btnAgain">再开一局</button>
        <button class="modal-btn minor" id="btnLevels">关卡花册</button>
      </div>
    </div>
  </div>

  <div class="level-overlay" id="levelOverlay" aria-hidden="true">
    <div class="level-modal">
      <div class="level-modal-head">
        <div>
          <span>花册</span>
          <strong>选择关卡</strong>
        </div>
        <button class="level-close" id="btnCloseLevels" title="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 6l12 12M18 6 6 18" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="level-grid" id="levelGrid"></div>
    </div>
  </div>
</main>

<script src="flower.js?v=007"></script>
</body>
</html>
