<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#100e16">
<title>命运航线 · 可视化调度 Demo</title>
<link rel="stylesheet" href="dispatch.css?v=304">
</head>
<body>
<canvas id="sky" aria-hidden="true"></canvas>

<main class="app">
  <header class="topbar">
    <a class="icon-btn" href="../home/index.html" title="主界面">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 5l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="title-block">
      <div class="eyebrow">VISUAL · ROUTE CONTROL</div>
      <h1>命运航线</h1>
    </div>
    <button class="icon-btn" id="btnSound" title="音效">♪</button>
  </header>

  <section class="status-grid" aria-label="调度状态">
    <div class="stat"><span>剩余</span><b id="timeText">90</b></div>
    <div class="stat"><span>稳定</span><b id="saveText">0</b></div>
    <div class="stat"><span>裂痕</span><b id="crackText">0</b></div>
  </section>

  <section class="stage-wrap" aria-label="命运航线调度区">
    <canvas id="stage"></canvas>
    <div class="level-strip" aria-label="当前关卡">
      <div class="level-row">
        <span id="levelName">第1幕 · 试航</span>
        <b id="levelRule">2线慢速</b>
      </div>
      <div class="level-meter"><i id="levelMeter"></i></div>
    </div>
    <div class="stage-hint" id="stageHint">拖动危机牌,画航线接入同色男主锚点</div>
  </section>

  <section class="log-panel" aria-label="剧情回响">
    <div class="panel-head">
      <span>剧情回响</span>
      <b id="comboText">连救 0</b>
    </div>
    <div class="log-feed" id="logFeed"></div>
  </section>

  <footer class="footer-row">
    <button class="main-btn" id="btnStart">开始调度</button>
    <button class="ghost-btn" id="btnRestart">重开</button>
  </footer>
</main>

<div class="toast" id="toast"></div>
<div class="overlay" id="overlay" aria-hidden="true">
  <div class="modal" id="modal"></div>
</div>

<script src="dispatch.js?v=309"></script>
</body>
</html>
